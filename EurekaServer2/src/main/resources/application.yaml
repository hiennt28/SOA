server:
  port: 8762

spring:
  application:
    name: eureka-server

eureka:
  instance:
    hostname: peer2
    prefer-ip-address: false
    
  client:
    register-with-eureka: true
    fetch-registry: true
    registry-fetch-interval-seconds: 5
    service-url:
      defaultZone: http://peer1:8761/eureka/

  server:
    eviction-interval-timer-in-ms: 3000
    peer-eureka-nodes-update-interval-ms: 1000